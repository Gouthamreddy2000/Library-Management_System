<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">

    <title>Registration Form</title>
</head>
<body>
<div class="container">
    <h3></h3>
    <hr>
    <p class="h4 mb-4"></p>
    <form action="#" th:action="@{/users/save}"
          th:object="${user}" method="POST">
        <input type="hidden" th:field="*{id}">

        <input type="text" th:field="*{firstName}"
               class="form-control mb-4 w-25" placeholder="First name">
        <input type="text" th:field="*{lastName}"
               class="form-control mb-4 w-25" placeholder="Last name">
        <input type="password" th:field="*{password}"
               class="form-control mb-4 w-25" placeholder="Password">
        <input type="password" th:field="*{confirmPassword}"
               class="form-control mb-4 w-25" placeholder="Confirm Password">
        <input type="text" th:field="*{email}"
               class="form-control mb-4 w-25" placeholder="Email">
        <input type="tel" th:field="*{phoneNumber}"
               class="form-control mb-4 w-25" placeholder="Phone Number">
        <button type="submit" class="btn btn-info col-2">Register</button>
    </form>
    <hr>
    <a th:href="@{/showMyLoginPage}">Back to Login Page</a>
</div>



</body>
</html>
