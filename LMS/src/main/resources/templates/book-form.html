<!DOCTYPE HTML>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
  <!-- Required meta tags -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-Zenh87qX5JnK2Jl0vWa8Ck2rdkQ2Bzep5IDxbcnCeuOxjzrPF/et3URy9Bv1WTRi" crossorigin="anonymous">

  <title>Add Book</title>
</head>
<body>
<div class="container">
  <h3>Book Directory</h3>
  <hr>
  <p class="h4 mb-4">Add Book</p>
  <form action="#" th:action="@{/books/save}"
        th:object="${book}" method="POST">
    <input type="hidden" th:field="*{bookId}">

    <input type="text" th:field="*{title}"
           class="form-control mb-4 w-25" placeholder="Title">
    <input type="text" th:field="*{author}"
           class="form-control mb-4 w-25" placeholder="Author">
    <input type="text" th:field="*{isbn}"
           class="form-control mb-4 w-25" placeholder="Isbn">
    <input type="text" th:field="*{category}"
           class="form-control mb-4 w-25" placeholder="Category">
    <input type="text" th:field="*{totalCopies}"
           class="form-control mb-4 w-25" placeholder="Total Copies">
    <input type="text" th:field="*{availableCopies}"
           class="form-control mb-4 w-25" placeholder="Available Copies">
    <input type="text" th:field="*{publishedYear}"
           class="form-control mb-4 w-25" placeholder="Published Year">
    <button type="submit" class="btn btn-info col-2">Save</button>
  </form>
  <hr>
  <a th:href="@{/}">Back to Books List</a>
  <form action="#" th:action="@{/logout}" method="POST">

    <input type="submit" value="Logout"/>
  </form>
</div>



</body>
</html>
